openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BioEval — Bioinformatics Paper Evaluator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: evaluations
    description: Paper evaluation operations
  - name: code-analysis
    description: Simulation code analysis operations
  - name: outreach
    description: Author outreach + feedback tracking operations
  - name: reviewers
    description: Global reviewer candidate list + feedback tracking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /evaluations:
    get:
      operationId: listEvaluations
      tags: [evaluations]
      summary: List all evaluations
      responses:
        "200":
          description: List of evaluations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Evaluation"
    post:
      operationId: createEvaluation
      tags: [evaluations]
      summary: Submit a paper URL for evaluation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationInput"
      responses:
        "201":
          description: Evaluation created and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"
        "400":
          description: Bad request

  /evaluations/{id}:
    get:
      operationId: getEvaluation
      tags: [evaluations]
      summary: Get a single evaluation with full results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Evaluation with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"
        "404":
          description: Not found
    delete:
      operationId: deleteEvaluation
      tags: [evaluations]
      summary: Delete an evaluation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /evaluations/{id}/rerun:
    post:
      operationId: rerunEvaluation
      tags: [evaluations]
      summary: Re-run AI analysis on an existing evaluation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Evaluation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"

  /evaluations/{id}/code-analyses:
    get:
      operationId: listCodeAnalyses
      tags: [code-analysis]
      summary: List all code analyses for an evaluation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of code analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodeAnalysis"
    post:
      operationId: createCodeAnalysis
      tags: [code-analysis]
      summary: Submit simulation code for analysis against a paper
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeAnalysisInput"
      responses:
        "201":
          description: Code analysis created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAnalysis"

  /evaluations/{id}/code-analyses/{analysisId}:
    get:
      operationId: getCodeAnalysis
      tags: [code-analysis]
      summary: Get a specific code analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: analysisId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Code analysis with segment breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAnalysis"
        "404":
          description: Not found

  /evaluations/{id}/outreach:
    get:
      operationId: listOutreach
      tags: [outreach]
      summary: List outreach records (with feedback) for an evaluation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of outreach records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Outreach"
        "400":
          description: Invalid evaluation id
    post:
      operationId: createOutreach
      tags: [outreach]
      summary: Create an outreach record for an evaluation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutreachInput"
      responses:
        "201":
          description: Outreach created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outreach"
        "400":
          description: Bad request
        "404":
          description: Evaluation not found

  /evaluations/{id}/outreach/{outreachId}:
    patch:
      operationId: updateOutreach
      tags: [outreach]
      summary: Update an outreach record (status, contact, notes)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: outreachId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutreachUpdate"
      responses:
        "200":
          description: Outreach updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outreach"
        "400":
          description: Invalid id or request body
        "404":
          description: Not found
    delete:
      operationId: deleteOutreach
      tags: [outreach]
      summary: Delete an outreach record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: outreachId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid id
        "404":
          description: Not found

  /evaluations/{id}/outreach/{outreachId}/sync:
    post:
      operationId: syncOutreach
      tags: [outreach]
      summary: Pull the linked GitHub issue's state + comments into this outreach record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: outreachId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Outreach synced with latest GitHub state + feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outreach"
        "400":
          description: Invalid id or not a GitHub-linked outreach record
        "404":
          description: Not found
        "502":
          description: Failed to reach GitHub

  /evaluations/{id}/outreach/{outreachId}/feedback:
    post:
      operationId: addOutreachFeedback
      tags: [outreach]
      summary: Manually record a response (e.g. an email or forum reply)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: outreachId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutreachFeedbackInput"
      responses:
        "201":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outreach"
        "400":
          description: Invalid id or request body
        "404":
          description: Not found

  /stats:
    get:
      operationId: getStats
      tags: [evaluations]
      summary: Get aggregate statistics across all evaluations
      responses:
        "200":
          description: Aggregate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationStats"

  /reviewers:
    get:
      operationId: listReviewers
      tags: [reviewers]
      summary: List all reviewer candidates
      responses:
        "200":
          description: List of reviewers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reviewer"
    post:
      operationId: createReviewer
      tags: [reviewers]
      summary: Add a reviewer candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewerInput"
      responses:
        "201":
          description: Reviewer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reviewer"
        "400":
          description: Bad request

  /reviewers/{reviewerId}:
    patch:
      operationId: updateReviewer
      tags: [reviewers]
      summary: Update a reviewer (status, feedback, details)
      parameters:
        - name: reviewerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewerUpdate"
      responses:
        "200":
          description: Reviewer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reviewer"
        "400":
          description: Invalid id or request body
        "404":
          description: Not found
    delete:
      operationId: deleteReviewer
      tags: [reviewers]
      summary: Delete a reviewer
      parameters:
        - name: reviewerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid id
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Evaluation:
      type: object
      required:
        - id
        - title
        - status
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        paperUrl:
          type: ["string", "null"]
        pdfFilename:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, analyzing, complete, error]
        overallScore:
          type: ["number", "null"]
        # Dim 1: Data Disclosure (18pt rubric)
        dataSourceScore:
          type: ["number", "null"]
        # Dim 2: Dataset Resolvability (14pt rubric)
        datasetScore:
          type: ["number", "null"]
        # Dim 3: Code Availability & Versioning (14pt rubric)
        reproducibilityScore:
          type: ["number", "null"]
        # Dim 4: Code-to-Data Traceability (18pt rubric)
        citationScore:
          type: ["number", "null"]
        # Dim 5: Simulation Derivation Clarity (18pt rubric)
        simulationClarityScore:
          type: ["number", "null"]
        # Dim 6: Reproducibility Package Quality (8pt rubric)
        reproPackageScore:
          type: ["number", "null"]
        # Dim 7: Information-Theoretic Rigor (10pt rubric)
        informationTheoryScore:
          type: ["number", "null"]
        # Rubric version that produced these scores (null = pre-versioning)
        rubricVersion:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        dataSourcesFound:
          type: ["integer", "null"]
        datasetsFound:
          type: ["integer", "null"]
        citationsFound:
          type: ["integer", "null"]
        findings:
          type: ["string", "null"]
        gaps:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        # JSON string: ResolvedAccession[]
        accessions:
          type: ["string", "null"]
        # JSON string: EvidenceItem[]
        evidenceItems:
          type: ["string", "null"]
        codeRepoUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    EvaluationInput:
      type: object
      required:
        - paperUrl
      properties:
        paperUrl:
          type: string
        title:
          type: string

    CodeAnalysis:
      type: object
      required:
        - id
        - evaluationId
        - title
        - status
        - createdAt
      properties:
        id:
          type: integer
        evaluationId:
          type: integer
        title:
          type: string
        codeSnippet:
          type: string
        language:
          type: string
        status:
          type: string
          enum: [pending, analyzing, complete, error]
        overallTraceability:
          type: ["number", "null"]
        summary:
          type: ["string", "null"]
        # JSON string: CodeSegment[] with paramSource classification
        segments:
          type: ["string", "null"]
        # JSON string: TraceabilityRow[]
        traceabilityMatrix:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    CodeAnalysisInput:
      type: object
      required:
        - codeSnippet
      properties:
        title:
          type: string
        codeSnippet:
          type: string
        language:
          type: string

    OutreachFeedback:
      type: object
      required:
        - id
        - outreachId
        - source
        - body
        - createdAt
      properties:
        id:
          type: integer
        outreachId:
          type: integer
        source:
          type: string
          enum: [github, manual]
        author:
          type: ["string", "null"]
        body:
          type: string
        externalUrl:
          type: ["string", "null"]
        externalCreatedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    Outreach:
      type: object
      required:
        - id
        - evaluationId
        - channel
        - status
        - createdAt
        - feedback
      properties:
        id:
          type: integer
        evaluationId:
          type: integer
        channel:
          type: string
          enum: [github, email, forum, other]
        contact:
          type: ["string", "null"]
        githubOwner:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        githubIssueNumber:
          type: ["integer", "null"]
        githubUrl:
          type: ["string", "null"]
        githubState:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, contacted, responded, closed]
        notes:
          type: ["string", "null"]
        lastSyncedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/OutreachFeedback"

    OutreachInput:
      type: object
      required:
        - channel
      properties:
        channel:
          type: string
          enum: [github, email, forum, other]
        contact:
          type: string
        githubUrl:
          type: string
        status:
          type: string
          enum: [pending, contacted, responded, closed]
        notes:
          type: string

    OutreachUpdate:
      type: object
      properties:
        contact:
          type: string
        status:
          type: string
          enum: [pending, contacted, responded, closed]
        notes:
          type: string

    OutreachFeedbackInput:
      type: object
      required:
        - body
      properties:
        author:
          type: string
        body:
          type: string

    Reviewer:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        affiliation:
          type: ["string", "null"]
        expertise:
          type: ["string", "null"]
        status:
          type: string
          enum: [not_contacted, contacted, responded, declined]
        feedback:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ReviewerInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        email:
          type: string
        affiliation:
          type: string
        expertise:
          type: string
        status:
          type: string
          enum: [not_contacted, contacted, responded, declined]
        feedback:
          type: string
        notes:
          type: string

    ReviewerUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        affiliation:
          type: string
        expertise:
          type: string
        status:
          type: string
          enum: [not_contacted, contacted, responded, declined]
        feedback:
          type: string
        notes:
          type: string

    EvaluationStats:
      type: object
      required:
        - totalEvaluations
        - averageOverallScore
        - averageDataSourceScore
        - statusBreakdown
      properties:
        totalEvaluations:
          type: integer
        averageOverallScore:
          type: number
        averageDataSourceScore:
          type: number
        averageDatasetScore:
          type: number
        averageCitationScore:
          type: number
        statusBreakdown:
          type: object
          additionalProperties:
            type: integer
        recentEvaluations:
          type: array
          items:
            $ref: "#/components/schemas/Evaluation"
